# Basic Airflow cluster configuration for CeleryExecutor with Redis and PostgreSQL.
#
# WARNING: This configuration is for local development. Do not use it in a production deployment.
#
# This configuration supports basic configuration using environment variables or an .env file
# The following variables are supported:
#
# AIRFLOW_IMAGE_NAME           - Docker image name used to run Airflow.
#                                Default: apache/airflow:3.0.4
# AIRFLOW_UID                  - User ID in Airflow containers
#                                Default: 50000
# AIRFLOW_PROJ_DIR             - Base path to which all the files will be volumed.
#                                Default: .
# Those configurations are useful mostly in case of standalone testing/running Airflow in test/try-out mode
#
# _AIRFLOW_WWW_USER_USERNAME   - Username for the administrator account (if requested).
#                                Default: airflow
# _AIRFLOW_WWW_USER_PASSWORD   - Password for the administrator account (if requested).
#                                Default: airflow
# _PIP_ADDITIONAL_REQUIREMENTS - Additional PIP requirements to add when starting all containers.
#                                Use this option ONLY for quick checks. Installing requirements at container
#                                startup is done EVERY TIME the service is started.
#                                A better way is to build a custom image or extend the official image
#                                as described in https://airflow.apache.org/docs/docker-stack/build.html.
#                                Default: ''
#
# Feel free to modify this file to suit your needs.
---
x-airflow-common:
  &airflow-common
  # In order to add custom dependencies or upgrade provider distributions you can use your extended image.
  # Comment the image line, place your Dockerfile in the directory where you placed the docker-compose.yaml
  # and uncomment the "build" line below, Then run `docker-compose build` to build the images.
#  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.0.4}
  build: .
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow_ncjar/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres_airflow_ncjar/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis-ncjar:6380/0
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8086/execution/'
    # Use simple http server on scheduler for health checks
    # See https://airflow.apache.org/docs/apache-airflow/stable/administration-and-deployment/logging-monitoring/check-health.html#scheduler-health-check-server
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # WARNING: Use _PIP_ADDITIONAL_REQUIREMENTS option ONLY for a quick checks
    # for other purpose (development, test and especially production usage) build/extend Airflow image.
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    # The following line can be used to set a custom config file, stored in the local config folder
    # yamllint enable rule:line-length
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
    PYTHONPATH: /home/airflow/.local/lib/python3.12/site-packages:/opt/airflow:/opt/airflow/dags:/opt/airflow/plugins
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
  networks:
    - ncjar_network
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    - ${AIRFLOW_PROJ_DIR:-.}/.env:/opt/airflow/.env
    - ${AIRFLOW_PROJ_DIR:-.}/jobs:/opt/airflow/jobs
    - ${AIRFLOW_PROJ_DIR:-.}/pipeline_metadata:/opt/airflow/pipeline_metadata
    - /var/run/docker.sock:/var/run/docker.sock  # Mount host Docker daemon to Airflow Docker daemon to spinup isolated containers
  user: "${AIRFLOW_UID:-50000}:0"
  env_file:
    - .env
  depends_on:
    &airflow-common-depends-on
    redis-ncjar:
      condition: service_healthy
    postgres_airflow_ncjar:
      condition: service_healthy

services:
  # yamllint disable rule:line-length
  # https://hub.docker.com/r/dpage/pgadmin4
  pgadmin_ncjar:
    image: dpage/pgadmin4
    container_name: pgadmin_ncjar
    ports:
      # Use the cloud VM’s public IP if deployed remotely for the local port
      - "8888:80"  # Exposes pgAdmin on http://localhost:5051
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    env_file:
      - .env
    networks:
      - ncjar_network
    volumes:
      - pgadmin-user-data_ncjar:/var/lib/pgadmin
      - ./servers.json:/pgadmin4/servers.json:ro
      - ./.pgpass:/pgpass:ro

  # Multi-broker Apache Kafka Setup. Will need to add more environment variables
  # May need to modify the local hosts ports to the cloud IPs
  # https://hub.docker.com/r/apache/kafka
  controller-1-ncjar:
    image: apache/kafka:latest
    container_name: controller-1-ncjar
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1-ncjar:9093,2@controller-2-ncjar:9094,3@controller-3-ncjar:9095
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - ncjar_network

  controller-2-ncjar:
    image: apache/kafka:latest
    container_name: controller-2-ncjar
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1-ncjar:9093,2@controller-2-ncjar:9094,3@controller-3-ncjar:9095
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - ncjar_network

  controller-3-ncjar:
    image: apache/kafka:latest
    container_name: controller-3-ncjar
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9095
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1-ncjar:9093,2@controller-2-ncjar:9094,3@controller-3-ncjar:9095
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - ncjar_network

  broker-1-ncjar:
    image: apache/kafka:latest
    container_name: broker-1-ncjar
    ports:
      - 29093:9092
    environment:
      KAFKA_NODE_ID: 4
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: 'PLAINTEXT://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-1-ncjar:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1-ncjar:9093,2@controller-2-ncjar:9094,3@controller-3-ncjar:9095

      # ---- REPLICATION & SAFETY ----
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_MIN_IN_SYNC_REPLICAS: 2
      KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE: "false"

      # ---- INTERNAL KAFKA TOPICS ----
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_OFFSETS_TOPIC_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2

      # ---- REBALANCING STABILITY ----
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000
      KAFKA_GROUP_MIN_SESSION_TIMEOUT_MS: 6000
      KAFKA_GROUP_MAX_SESSION_TIMEOUT_MS: 300000
      KAFKA_GROUP_MAX_SIZE: 10000

      # ---- PRODUCER STABILITY ----
      KAFKA_MESSAGE_MAX_BYTES: 20971520
      KAFKA_REPLICA_FETCH_MAX_BYTES: 20971520
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600

      # ---- NETWORK AND TIMEOUTS ----
      KAFKA_SOCKET_CONNECTION_SETUP_TIMEOUT_MS: 30000
      KAFKA_SOCKET_CONNECTION_SETUP_TIMEOUT_MAX_MS: 30000
      KAFKA_REPLICA_SOCKET_TIMEOUT_MS: 30000
      KAFKA_CONTROLLER_SOCKET_TIMEOUT_MS: 30000
      KAFKA_NUM_NETWORK_THREADS: 8
      KAFKA_NUM_IO_THREADS: 16

      # ---- LOG RETENTION ----
      KAFKA_LOG_RETENTION_HOURS: 72
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_LOG_DIRS: /var/lib/kafka/data

      # ---- CONSUMER STABILITY ----
      KAFKA_MAX_PARTITION_FETCH_BYTES: 20971520
      KAFKA_FETCH_MAX_BYTES: 52428800

      # ---- CLUSTER PERFORMANCE ----
      KAFKA_NUM_RECOVERY_THREADS_PER_DATA_DIR: 4
      KAFKA_NUM_REPLICA_ALTER_LOG_DIRS_THREADS: 4

    networks:
      - ncjar_network
    volumes:
      - broker1-ncjar-data:/var/lib/kafka/data
    depends_on:
      - controller-1-ncjar
      - controller-2-ncjar
      - controller-3-ncjar
    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-metadata-quorum.sh", "--bootstrap-server", "broker-1-ncjar:9092", "describe", "--status" ]
      interval: 15m
      timeout: 15s
      retries: 2
      start_period: 90s

  broker-2-ncjar:
    image: apache/kafka:latest
    container_name: broker-2-ncjar
    ports:
      - 39093:9092
    environment:
      KAFKA_NODE_ID: 5
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: 'PLAINTEXT://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-2-ncjar:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1-ncjar:9093,2@controller-2-ncjar:9094,3@controller-3-ncjar:9095

      # ---- REPLICATION & SAFETY ----
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_MIN_IN_SYNC_REPLICAS: 2
      KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE: "false"

      # ---- INTERNAL KAFKA TOPICS ----
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_OFFSETS_TOPIC_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2

      # ---- REBALANCING STABILITY ----
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000
      KAFKA_GROUP_MIN_SESSION_TIMEOUT_MS: 6000
      KAFKA_GROUP_MAX_SESSION_TIMEOUT_MS: 300000
      KAFKA_GROUP_MAX_SIZE: 10000

      # ---- PRODUCER STABILITY ----
      KAFKA_MESSAGE_MAX_BYTES: 20971520
      KAFKA_REPLICA_FETCH_MAX_BYTES: 20971520
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600

      # ---- NETWORK AND TIMEOUTS ----
      KAFKA_SOCKET_CONNECTION_SETUP_TIMEOUT_MS: 30000
      KAFKA_SOCKET_CONNECTION_SETUP_TIMEOUT_MAX_MS: 30000
      KAFKA_REPLICA_SOCKET_TIMEOUT_MS: 30000
      KAFKA_CONTROLLER_SOCKET_TIMEOUT_MS: 30000
      KAFKA_NUM_NETWORK_THREADS: 8
      KAFKA_NUM_IO_THREADS: 16

      # ---- LOG RETENTION ----
      KAFKA_LOG_RETENTION_HOURS: 72
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_LOG_DIRS: /var/lib/kafka/data

      # ---- CONSUMER STABILITY ----
      KAFKA_MAX_PARTITION_FETCH_BYTES: 20971520
      KAFKA_FETCH_MAX_BYTES: 52428800

      # ---- CLUSTER PERFORMANCE ----
      KAFKA_NUM_RECOVERY_THREADS_PER_DATA_DIR: 4
      KAFKA_NUM_REPLICA_ALTER_LOG_DIRS_THREADS: 4

    networks:
      - ncjar_network
    volumes:
      - broker2-ncjar-data:/var/lib/kafka/data
    depends_on:
      - controller-1-ncjar
      - controller-2-ncjar
      - controller-3-ncjar
    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-metadata-quorum.sh", "--bootstrap-server", "broker-2-ncjar:9092", "describe", "--status" ]
      interval: 15m
      timeout: 15s
      retries: 2
      start_period: 90s

  broker-3-ncjar:
    image: apache/kafka:latest
    container_name: broker-3-ncjar
    ports:
      - 49093:9092
    environment:
      KAFKA_NODE_ID: 6
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: 'PLAINTEXT://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-3-ncjar:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1-ncjar:9093,2@controller-2-ncjar:9094,3@controller-3-ncjar:9095

      # ---- REPLICATION & SAFETY ----
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_MIN_IN_SYNC_REPLICAS: 2
      KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE: "false"

      # ---- INTERNAL KAFKA TOPICS ----
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_OFFSETS_TOPIC_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2

      # ---- REBALANCING STABILITY ----
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000
      KAFKA_GROUP_MIN_SESSION_TIMEOUT_MS: 6000
      KAFKA_GROUP_MAX_SESSION_TIMEOUT_MS: 300000
      KAFKA_GROUP_MAX_SIZE: 10000

      # ---- PRODUCER STABILITY ----
      KAFKA_MESSAGE_MAX_BYTES: 20971520
      KAFKA_REPLICA_FETCH_MAX_BYTES: 20971520
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600

      # ---- NETWORK AND TIMEOUTS ----
      KAFKA_SOCKET_CONNECTION_SETUP_TIMEOUT_MS: 30000
      KAFKA_SOCKET_CONNECTION_SETUP_TIMEOUT_MAX_MS: 30000
      KAFKA_REPLICA_SOCKET_TIMEOUT_MS: 30000
      KAFKA_CONTROLLER_SOCKET_TIMEOUT_MS: 30000
      KAFKA_NUM_NETWORK_THREADS: 8
      KAFKA_NUM_IO_THREADS: 16

      # ---- LOG RETENTION ----
      KAFKA_LOG_RETENTION_HOURS: 72
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_LOG_DIRS: /var/lib/kafka/data

      # ---- CONSUMER STABILITY ----
      KAFKA_MAX_PARTITION_FETCH_BYTES: 20971520
      KAFKA_FETCH_MAX_BYTES: 52428800

      # ---- CLUSTER PERFORMANCE ----
      KAFKA_NUM_RECOVERY_THREADS_PER_DATA_DIR: 4
      KAFKA_NUM_REPLICA_ALTER_LOG_DIRS_THREADS: 4

    networks:
      - ncjar_network
    volumes:
      - broker3-ncjar-data:/var/lib/kafka/data
    depends_on:
      - controller-1-ncjar
      - controller-2-ncjar
      - controller-3-ncjar
    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-metadata-quorum.sh", "--bootstrap-server", "broker-3-ncjar:9092", "describe", "--status" ]
      interval: 15m
      timeout: 15s
      retries: 2
      start_period: 90s

  postgres_airflow_ncjar:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    networks:
      - ncjar_network
    volumes:
      - postgres-airflow-volume-ncjar:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  redis-ncjar:
    # Redis is limited to 7.2-bookworm due to licencing change
    # https://redis.io/blog/redis-adopts-dual-source-available-licensing/
    image: redis:7.2-bookworm
    networks:
      - ncjar_network
    expose:
      - 6380
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always

  ncjar-debug:
    build:
      context: .
      dockerfile: Dockerfile.debug
    container_name: ncjar-debug
    profiles:
      - debug
    tty: true
    stdin_open: true
    # Join the same network as Airflow + Kafka + Selenium
    networks:
      - ncjar_network
    environment:
      PYTHONNOUSERSITE: "1"
      PYTHONPATH: /workspace/ncjar_core:/workspace
    # Shared data volume (same one jobs use)
    volumes:
      - .:/workspace
    # Load environment variables (same as everything else)
    env_file:
      - .env
    working_dir: /workspace
    command: >
      bash -c "
      pip install -e /workspace/ncjar_core &&
      tail -f /dev/null
      "

  airflow-apiserver-ncjar:
    <<: *airflow-common
    command: api-server --port 8086
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8086/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 75s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init-ncjar:
        condition: service_completed_successfully

  airflow-scheduler-ncjar:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8975/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init-ncjar:
        condition: service_completed_successfully

  airflow-dag-processor-ncjar:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init-ncjar:
        condition: service_completed_successfully

  airflow-worker-ncjar:
    <<: *airflow-common
    command: celery worker
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      # Required to handle warm shutdown of the celery workers properly
      # See https://airflow.apache.org/docs/docker-stack/entrypoint.html#signal-propagation
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-apiserver-ncjar:
        condition: service_healthy
      airflow-init-ncjar:
        condition: service_completed_successfully

  airflow-triggerer-ncjar:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init-ncjar:
        condition: service_completed_successfully
  # yamllint enable rule:line-length
  airflow-init-ncjar:
    <<: *airflow-common
    entrypoint: /bin/bash
    # yamllint disable rule:line-length
    command:
      - -c
      - |
        if [[ -z "${AIRFLOW_UID}" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: AIRFLOW_UID not set!\e[0m"
          echo "If you are on Linux, you SHOULD follow the instructions below to set "
          echo "AIRFLOW_UID environment variable, otherwise files will be owned by root."
          echo "For other operating systems you can get rid of the warning with manually created .env file:"
          echo "    See: https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#setting-the-right-airflow-user"
          echo
          export AIRFLOW_UID=$$(id -u)
        fi
        one_meg=1048576
        mem_available=$$(($$(getconf _PHYS_PAGES) * $$(getconf PAGE_SIZE) / one_meg))
        cpus_available=$$(grep -cE 'cpu[0-9]+' /proc/stat)
        disk_available=$$(df / | tail -1 | awk '{print $$4}')
        warning_resources="false"
        if (( mem_available < 4000 )) ; then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough memory available for Docker.\e[0m"
          echo "At least 4GB of memory required. You have $$(numfmt --to iec $$((mem_available * one_meg)))"
          echo
          warning_resources="true"
        fi
        if (( cpus_available < 2 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough CPUS available for Docker.\e[0m"
          echo "At least 2 CPUs recommended. You have $${cpus_available}"
          echo
          warning_resources="true"
        fi
        if (( disk_available < one_meg * 10 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough Disk space available for Docker.\e[0m"
          echo "At least 10 GBs recommended. You have $$(numfmt --to iec $$((disk_available * 1024 )))"
          echo
          warning_resources="true"
        fi
        if [[ $${warning_resources} == "true" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: You have not enough resources to run Airflow (see above)!\e[0m"
          echo "Please follow the instructions to increase amount of resources available:"
          echo "   https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#before-you-begin"
          echo
        fi
        echo
        echo "Creating missing opt dirs if missing:"
        echo
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Airflow version:"
        /entrypoint airflow version
        echo
        echo "Files in shared volumes:"
        echo
        ls -la /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Running airflow config list to create default config file if missing."
        echo
        /entrypoint airflow config list >/dev/null
        echo
        echo "Files in shared volumes:"
        echo
        ls -la /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Change ownership of files in /opt/airflow to ${AIRFLOW_UID}:0"
        echo
        chown -R "${AIRFLOW_UID}:0" /opt/airflow/
        echo
        echo "Change ownership of files in shared volumes to ${AIRFLOW_UID}:0"
        echo
        chown -v -R "${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Files in shared volumes:"
        echo
        ls -la /opt/airflow/{logs,dags,plugins,config}

    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"

  airflow-cli-ncjar:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    # Workaround for entrypoint issue. See: https://github.com/apache/airflow/issues/16252
    # yamllint enable rule:line-length
    command:
      - bash
      - -c
      - airflow
    depends_on:
      <<: *airflow-common-depends-on
  # yamllint disable rule:line-length
  # You can enable flower by adding "--profile flower" option e.g. docker-compose --profile flower up
  # or by explicitly targeted on the command line e.g. docker-compose up flower.
  # See: https://docs.docker.com/compose/profiles/
  flower-ncjar:
    <<: *airflow-common
    command: celery flower
    profiles:
      - flower
    ports:
      - "5556:5556"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5556/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init-ncjar:
        condition: service_completed_successfully
# yamllint enable rules:line-length
networks:
  ncjar_network:
    name: ncjar_network
    driver: bridge

volumes:
  pgadmin-user-data_ncjar:
  postgres-airflow-volume-ncjar:
  broker1-ncjar-data:
  broker2-ncjar-data:
  broker3-ncjar-data:
